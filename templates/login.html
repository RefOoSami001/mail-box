<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailBox — تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme variables ── */
    [data-theme="dark"] {
      --bg:       #05080f;
      --surface:  rgba(12,18,32,.92);
      --border:   rgba(255,255,255,.08);
      --border2:  rgba(255,255,255,.13);
      --text:     #dde3f0;
      --text2:    #8b97b0;
      --muted:    #4a5468;
      --danger:   #f25f7a;
      --glow1:    rgba(79,142,247,.15);
      --glow2:    rgba(124,94,245,.12);
      --shadow:   0 40px 100px rgba(0,0,0,.6);
      --grid:     rgba(79,142,247,.025);
    }
    [data-theme="light"] {
      --bg:       #eef2f9;
      --surface:  rgba(255,255,255,.95);
      --border:   rgba(0,0,0,.08);
      --border2:  rgba(0,0,0,.13);
      --text:     #111827;
      --text2:    #4b5563;
      --muted:    #9ca3af;
      --danger:   #dc2626;
      --glow1:    rgba(79,142,247,.1);
      --glow2:    rgba(124,94,245,.08);
      --shadow:   0 40px 100px rgba(0,0,0,.15);
      --grid:     rgba(79,142,247,.04);
    }

    :root {
      --accent:  #4f8ef7;
      --accent2: #7c5ef5;
    }

    body {
      font-family: 'Alexandria', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
      transition: background .3s, color .3s;
    }

    /* grid */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* glows */
    .glow {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
      opacity: 0; animation: glowIn 1s ease forwards;
    }
    .g1 { width:550px;height:550px;background:radial-gradient(circle,var(--glow1),transparent 70%);top:-180px;right:-100px;animation-delay:.1s; }
    .g2 { width:460px;height:460px;background:radial-gradient(circle,var(--glow2),transparent 70%);bottom:-140px;left:-80px;animation-delay:.3s; }
    @keyframes glowIn { to { opacity:1; } }

    /* theme toggle */
    .theme-toggle {
      position: fixed; top: 1rem; left: 1rem; z-index: 20;
      width: 38px; height: 38px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text2);
      transition: background .2s, color .2s;
      backdrop-filter: blur(12px);
    }
    .theme-toggle:hover { color: var(--text); }
    .theme-toggle svg { width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round; }

    /* card */
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 430px;
      margin: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.8rem 2.4rem 2.4rem;
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
      transition: background .3s, border-color .3s;
    }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(24px) scale(.98); }
      to   { opacity:1; transform:none; }
    }

    .logo {
      display: flex; align-items: center; gap: .65rem; margin-bottom: 2rem;
    }
    .logo-mark {
      width: 44px; height: 44px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(79,142,247,.3);
    }
    .logo-mark svg { width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round; }
    .logo-name {
      font-size: 1.5rem; font-weight: 800; letter-spacing: -.02em;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      --webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: .4rem; }
    .subtitle { font-size: .88rem; color: var(--text2); margin-bottom: 1.8rem; line-height: 1.6; }

    .server-pill {
      display: inline-flex; align-items: center; gap: .5rem;
      background: rgba(0,201,167,.07); border: 1px solid rgba(0,201,167,.18);
      border-radius: 30px; padding: .38rem .9rem;
      font-size: .77rem; color: #00c9a7;
      margin-bottom: 1.7rem;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #00c9a7;
      animation: lp 2.2s ease infinite;
    }
    @keyframes lp {
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:.4;transform:scale(.75)}
    }

    .error-box {
      display: flex; align-items: flex-start; gap: .5rem;
      background: rgba(220,38,38,.08); border: 1px solid rgba(220,38,38,.22);
      border-radius: 11px; padding: .8rem .95rem;
      color: var(--danger); font-size: .86rem;
      margin-bottom: 1.3rem; line-height: 1.5;
    }

    .field { margin-bottom: 1.2rem; }
    label {
      display: block; font-size: .71rem; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; color: var(--muted); margin-bottom: .45rem;
    }
    .inp-wrap { position: relative; }
    .inp-icon {
      position: absolute; right: .9rem; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none; display: flex;
    }
    .inp-icon svg { width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round; }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: rgba(79,142,247,.04);
      border: 1px solid var(--border2);
      border-radius: 11px;
      padding: .82rem 2.5rem .82rem 1rem;
      color: var(--text);
      font-family: 'Alexandria', sans-serif;
      font-size: .93rem; outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input[type="email"]:focus, input[type="password"]:focus {
      border-color: rgba(79,142,247,.5);
      box-shadow: 0 0 0 3px rgba(79,142,247,.1);
      background: rgba(79,142,247,.06);
    }
    input::placeholder { color: var(--muted); }

    button[type="submit"] {
      width: 100%; padding: .9rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 13px;
      color: #fff; font-family: 'Alexandria', sans-serif;
      font-size: .98rem; font-weight: 700; letter-spacing: -.01em;
      cursor: pointer; margin-top: .4rem;
      box-shadow: 0 6px 20px rgba(79,142,247,.32);
      transition: opacity .2s, transform .15s, box-shadow .2s;
    }
    button[type="submit"]:hover  { opacity: .92; box-shadow: 0 10px 28px rgba(79,142,247,.42); }
    button[type="submit"]:active { transform: scale(.98); }

    .footer-note {
      text-align: center; font-size: .74rem; color: var(--muted); margin-top: 1.5rem;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem 1.8rem; border-radius: 18px; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <!-- glows -->
  <div class="glow g1"></div>
  <div class="glow g2"></div>

  <!-- theme toggle -->
  <button class="theme-toggle" id="themeBtn" title="تبديل المظهر">
    <svg id="iconMoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="iconSun"  viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <div class="card">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
      </div>
    </div>

    <h1>مرحباً بك</h1>
    <p class="subtitle">سجّل دخولك باستخدام بريدك الإلكتروني.</p>

    {% if error %}
    <div class="error-box">⚠️ <span>{{ error }}</span></div>
    {% endif %}

    <form method="POST" onsubmit="this.querySelector('button').style.opacity='.6'">
      <input type="hidden" name="host" value="pop3.kuku.lu" />
      <input type="hidden" name="port" value="995" />

      <div class="field">
        <label>البريد الإلكتروني</label>
        <div class="inp-wrap">
          <div class="inp-icon"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg></div>
          <input name="username" type="email"
                 placeholder="user@domain.com"
                 value="{{ request.form.username or '' }}"
                 autocomplete="username" required />
        </div>
      </div>

      <button type="submit">الدخول إلى البريد</button>
    </form>

    <p class="footer-note">اتصال آمن مشفر · SSL/TLS</p>
  </div>

  <script>
    const html   = document.documentElement;
    const moon   = document.getElementById('iconMoon');
    const sun    = document.getElementById('iconSun');
    const saved  = localStorage.getItem('mb-theme') || 'dark';

    function applyTheme(t) {
      html.setAttribute('data-theme', t);
      localStorage.setItem('mb-theme', t);
      moon.style.display = t === 'dark' ? 'block' : 'none';
      sun.style.display  = t === 'light' ? 'block' : 'none';
    }
    applyTheme(saved);

    document.getElementById('themeBtn').addEventListener('click', () => {
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  </script>
</body>
</html>
