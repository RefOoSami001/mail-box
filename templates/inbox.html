<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MailBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ═══════════════════════════════════════ TOKENS ═══ */
    :root {
      --accent:    #4f8ef7;
      --accent2:   #7c5ef5;
      --green:     #22c55e;
      --teal:      #00c9a7;
      --amber:     #f59e0b;
      --danger:    #f25f7a;
      --sidebar-w: 330px;
      --top-h:     60px;
      --radius:    14px;
      --radius-sm: 9px;
      --ease:      cubic-bezier(.4,0,.2,1);
    }
    [data-theme="dark"] {
      --bg:      #06090f;
      --surf:    #0d1525;
      --surf2:   #121e30;
      --surf3:   #1a2840;
      --border:  rgba(255,255,255,.07);
      --bord2:   rgba(255,255,255,.12);
      --text:    #e2e8f4;
      --text2:   #7d8fa8;
      --text3:   #3d4f66;
      --glow:    rgba(79,142,247,.18);
      --shadow:  0 24px 60px rgba(0,0,0,.6);
      --frame:   #fff;
    }
    [data-theme="light"] {
      --bg:      #f1f5fb;
      --surf:    #ffffff;
      --surf2:   #f7f9fd;
      --surf3:   #edf1f8;
      --border:  rgba(0,0,0,.07);
      --bord2:   rgba(0,0,0,.12);
      --text:    #0f172a;
      --text2:   #475569;
      --text3:   #94a3b8;
      --glow:    rgba(79,142,247,.1);
      --shadow:  0 24px 60px rgba(0,0,0,.12);
      --frame:   #fff;
    }

    /* ═══════════════════════════════════════ BASE ═══ */
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Alexandria', sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
      transition: background .3s, color .3s;
    }

    /* ═══════════════════════════════════════ TOPBAR ═══ */
    .topbar {
      height: var(--top-h); flex-shrink: 0; z-index: 40;
      background: var(--surf);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 1rem; gap: .65rem;
      position: relative;
    }
    /* Subtle gradient line under topbar */
    .topbar::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      opacity: .35;
    }

    .logo { display:flex; align-items:center; gap:.5rem; text-decoration:none; flex-shrink:0; }
    .logo-mark {
      width:32px; height:32px; border-radius:9px; flex-shrink:0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display:flex; align-items:center; justify-content:center;
      box-shadow: 0 3px 12px rgba(79,142,247,.4);
    }
    .logo-mark svg { width:15px; height:15px; fill:none; stroke:#fff; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }
    .logo-name {
      font-size:1.1rem; font-weight:800; letter-spacing:-.03em;
      background: linear-gradient(90deg,var(--accent),var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .topbar-sep { width:1px; height:22px; background:var(--bord2); flex-shrink:0; }

    .user-pill {
      display:flex; align-items:center; gap:.45rem; flex:1; min-width:0;
      background:var(--surf2); border:1px solid var(--border);
      border-radius:20px; padding:.25rem .25rem .25rem .25rem;
      cursor:pointer; transition:background .18s, border-color .18s;
    }
    .user-pill:hover { background:var(--surf3); border-color:var(--bord2); }
    .user-pill:active { transform:scale(.97); }
    .user-av {
      width:22px; height:22px; border-radius:50%; flex-shrink:0;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex; align-items:center; justify-content:center;
      font-size:.6rem; font-weight:800; color:#fff;
    }
    .user-email { font-size:.78rem; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .copy-me-icon {
      width:22px; height:22px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      color:var(--text3); transition:color .15s;
    }
    .user-pill:hover .copy-me-icon { color:var(--accent); }
    .copy-me-icon svg { width:11px; height:11px; fill:none; stroke:currentColor; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

    .topbar-r { display:flex; align-items:center; gap:.4rem; flex-shrink:0; }

    .count-pill {
      font-size:.72rem; font-weight:700;
      background:rgba(79,142,247,.1); border:1px solid rgba(79,142,247,.22);
      color:var(--accent); border-radius:20px; padding:.2rem .6rem;
      opacity:0; transition:opacity .3s; white-space:nowrap;
    }
    .count-pill.vis { opacity:1; }

    /* Shared icon button */
    .ibtn {
      width:34px; height:34px; border-radius:var(--radius-sm);
      background:var(--surf2); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:var(--text2); flex-shrink:0;
      transition:background .18s, color .18s, border-color .18s, transform .12s;
      text-decoration:none;
    }
    .ibtn:hover { background:var(--surf3); color:var(--text); }
    .ibtn:active { transform:scale(.93); }
    .ibtn svg { width:15px; height:15px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

    .btn-refresh {
      display:flex; align-items:center; gap:.4rem;
      height:34px; padding:0 .85rem; border-radius:var(--radius-sm);
      background:var(--surf2); border:1px solid var(--border);
      cursor:pointer; color:var(--text2);
      font-family:'Alexandria',sans-serif; font-size:.8rem; font-weight:600;
      white-space:nowrap; flex-shrink:0;
      transition:background .18s, color .18s, transform .12s;
    }
    .btn-refresh:hover:not(:disabled) { background:var(--surf3); color:var(--text); }
    .btn-refresh:active { transform:scale(.96); }
    .btn-refresh:disabled { opacity:.45; cursor:not-allowed; }
    .btn-refresh.spin .spin-i { animation:spinA .5s linear infinite; }
    @keyframes spinA { to { transform:rotate(360deg); } }
    .spin-i { display:inline-flex; }
    .spin-i svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

    .btn-theme { position:relative; overflow:hidden; }

    .btn-logout:hover { background:rgba(242,95,122,.1); color:var(--danger); border-color:rgba(242,95,122,.25); }

    /* ═══════════════════════════════════════ LAYOUT ═══ */
    .layout { display:flex; flex:1; overflow:hidden; min-height:0; }

    /* ═══════════════════════════════════════ SIDEBAR ═══ */
    .sidebar {
      width:var(--sidebar-w); flex-shrink:0;
      background:var(--surf); border-left:1px solid var(--border);
      display:flex; flex-direction:column; overflow:hidden;
      transition:background .3s;
    }

    .sb-head { padding:.85rem 1rem .7rem; border-bottom:1px solid var(--border); flex-shrink:0; }
    .sb-label { font-size:.64rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:.6rem; }

    .search-wrap { position:relative; }
    .search-wrap input {
      width:100%; background:var(--surf2); border:1px solid var(--border);
      border-radius:var(--radius-sm); padding:.58rem 2rem .58rem .9rem;
      color:var(--text); font-family:'Alexandria',sans-serif; font-size:.82rem;
      outline:none; transition:border-color .2s, background .2s;
    }
    .search-wrap input:focus { border-color:rgba(79,142,247,.45); background:var(--surf3); }
    .search-wrap input::placeholder { color:var(--text3); }
    .search-ico { position:absolute; left:.7rem; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; display:flex; }
    .search-ico svg { width:13px; height:13px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

    /* Warn banner */
    .warn-bar {
      margin:.35rem .5rem 0; padding:.45rem .75rem;
      background:rgba(245,158,11,.09); border:1px solid rgba(245,158,11,.25);
      border-radius:8px; font-size:.73rem; color:var(--amber);
      line-height:1.4; display:none;
    }
    .warn-bar.show { display:block; }

    .msg-list { flex:1; overflow-y:auto; padding:.3rem .4rem; }
    .msg-list::-webkit-scrollbar { width:3px; }
    .msg-list::-webkit-scrollbar-thumb { background:var(--bord2); border-radius:3px; }

    /* ── Message row ── */
    .msg-row {
      padding:.8rem .85rem; border-radius:var(--radius); cursor:pointer;
      border:1px solid transparent; margin-bottom:2px; position:relative;
      transition:background .15s, border-color .15s, transform .12s;
      animation:rowIn .3s var(--ease) both;
      overflow:hidden;
    }
    @keyframes rowIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
    .msg-row::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(79,142,247,.0),rgba(124,94,245,.0));
      transition:opacity .2s; opacity:0;
    }
    .msg-row:hover { background:var(--surf2); }
    .msg-row:hover::before { opacity:1; }
    .msg-row:active { transform:scale(.985); }
    .msg-row.active { background:rgba(79,142,247,.08); border-color:rgba(79,142,247,.2); }
    .msg-row.active::after {
      content:''; position:absolute; right:0; top:18%; bottom:18%;
      width:3px; border-radius:3px;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
    }

    .row-top { display:flex; align-items:flex-start; justify-content:space-between; gap:.4rem; margin-bottom:.28rem; }
    .row-left { display:flex; align-items:center; gap:.45rem; min-width:0; }
    .av {
      width:30px; height:30px; border-radius:9px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:.7rem; font-weight:800; color:#fff;
      position:relative;
    }
    .row-sender { font-size:.84rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .row-date { font-size:.68rem; color:var(--text3); flex-shrink:0; white-space:nowrap; }
    .row-subj { font-size:.78rem; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:.2rem; padding-right:38px; }
    .row-prev { font-size:.73rem; color:var(--text3); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.5; padding-right:38px; }

    /* code badge in list */
    .code-badge {
      display:inline-flex; align-items:center; gap:.3rem;
      background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25);
      color:var(--green); border-radius:6px; padding:.15rem .45rem;
      font-size:.68rem; font-weight:700; margin-top:.3rem; margin-right:38px;
    }
    .code-badge svg { width:10px; height:10px; }

    /* ── Skeleton ── */
    .sk {
      background:linear-gradient(90deg,var(--surf2) 25%,var(--surf3) 50%,var(--surf2) 75%);
      background-size:200% 100%; animation:shimmer 1.4s ease infinite; border-radius:5px;
    }
    @keyframes shimmer { to { background-position:-200% 0; } }
    .sk-row { padding:.8rem .85rem; margin-bottom:2px; }

    .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:220px; gap:.75rem; padding:2rem; text-align:center; color:var(--text3); }
    .empty .ei { font-size:2.5rem; opacity:.35; }
    .empty p { font-size:.83rem; line-height:1.65; }

    /* ═══════════════════════════════════════ VIEWER ═══ */
    .viewer {
      flex:1; overflow-y:auto; background:var(--bg);
      display:flex; flex-direction:column;
      transition:background .3s; min-width:0;
    }
    .viewer::-webkit-scrollbar { width:4px; }
    .viewer::-webkit-scrollbar-thumb { background:var(--bord2); border-radius:4px; }

    .ph {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:1.1rem; color:var(--text3); padding:2rem;
    }
    .ph-ico {
      width:72px; height:72px; border-radius:20px;
      background:var(--surf); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center;
    }
    .ph-ico svg { width:30px; height:30px; fill:none; stroke:var(--text3); stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; }
    .ph h3 { font-size:1rem; font-weight:600; color:var(--text2); text-align:center; }
    .ph p  { font-size:.83rem; color:var(--text3); text-align:center; line-height:1.6; }

    .viewer-inner { padding:1.6rem 1.8rem; max-width:820px; width:100%; align-self:center; }

    /* Back btn — mobile */
    .back-btn {
      display:none; align-items:center; gap:.4rem;
      font-size:.82rem; font-weight:600; color:var(--accent);
      background:none; border:none; cursor:pointer; padding:0;
      margin-bottom:1rem; font-family:'Alexandria',sans-serif;
      transition:opacity .15s;
    }
    .back-btn:active { opacity:.6; }
    .back-btn svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

    /* ── Code detection banner ── */
    .code-banner {
      display:none; align-items:center; gap:.75rem;
      background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(0,201,167,.08));
      border:1px solid rgba(34,197,94,.3);
      border-radius:var(--radius); padding:1rem 1.1rem;
      margin-bottom:1.1rem;
      animation:fadeUp .25s var(--ease) both;
    }
    .code-banner.show { display:flex; }
    .cb-icon { width:38px; height:38px; border-radius:10px; background:rgba(34,197,94,.15); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .cb-icon svg { width:18px; height:18px; fill:none; stroke:var(--green); stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .cb-body { flex:1; min-width:0; }
    .cb-label { font-size:.71rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--green); margin-bottom:.2rem; }
    .cb-code { font-size:1.55rem; font-weight:800; letter-spacing:.15em; color:var(--text); font-variant-numeric:tabular-nums; }
    .cb-copy {
      display:flex; align-items:center; gap:.4rem;
      background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.3);
      border-radius:8px; padding:.45rem .8rem; cursor:pointer;
      color:var(--green); font-family:'Alexandria',sans-serif;
      font-size:.78rem; font-weight:700; white-space:nowrap; flex-shrink:0;
      transition:background .18s, transform .12s;
    }
    .cb-copy:hover { background:rgba(34,197,94,.25); }
    .cb-copy:active { transform:scale(.94); }
    .cb-copy svg { width:13px; height:13px; fill:none; stroke:currentColor; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

    /* ── Message header card ── */
    .hdr-card {
      background:var(--surf); border:1px solid var(--border);
      border-radius:var(--radius); padding:1.3rem 1.4rem 1.2rem;
      margin-bottom:1.1rem;
      animation:fadeUp .22s var(--ease) both;
      transition:background .3s;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:none} }

    .hdr-subj { font-size:1.18rem; font-weight:700; letter-spacing:-.02em; line-height:1.4; margin-bottom:.85rem; }

    .hdr-row { display:flex; align-items:center; flex-wrap:wrap; gap:.5rem; }
    .from-chip {
      display:flex; align-items:center; gap:.4rem;
      background:var(--surf2); border:1px solid var(--border);
      border-radius:20px; padding:.28rem .65rem .28rem .28rem;
      transition:background .2s;
    }
    .from-chip .av-sm { width:20px; height:20px; border-radius:6px; font-size:.56rem; }
    .from-chip .fname { font-size:.8rem; font-weight:600; color:var(--text); }
    .from-chip .faddr { font-size:.72rem; color:var(--text3); }

    /* copy email btn */
    .copy-email-btn {
      display:flex; align-items:center; gap:.35rem;
      background:var(--surf2); border:1px solid var(--border);
      border-radius:20px; padding:.28rem .65rem;
      cursor:pointer; color:var(--text3); font-size:.74rem; font-weight:600;
      font-family:'Alexandria',sans-serif; white-space:nowrap;
      transition:background .18s, color .18s, transform .1s;
    }
    .copy-email-btn:hover { background:var(--surf3); color:var(--text2); }
    .copy-email-btn:active { transform:scale(.93); }
    .copy-email-btn svg { width:12px; height:12px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

    .hdr-date { font-size:.74rem; color:var(--text3); margin-right:auto; }

    /* ── Body card ── */
    .body-card {
      background:var(--surf); border:1px solid var(--border);
      border-radius:var(--radius); overflow:hidden;
      animation:fadeUp .28s var(--ease) .06s both;
      transition:background .3s;
    }

    .body-bar {
      display:flex; align-items:center;
      padding:.55rem .9rem; border-bottom:1px solid var(--border);
      gap:.4rem; min-height:42px;
    }
    .view-tog { display:none; background:var(--surf2); border:1px solid var(--border); border-radius:7px; overflow:hidden; }
    .vtog-btn {
      padding:.28rem .7rem; background:none; border:none; cursor:pointer;
      color:var(--text3); font-family:'Alexandria',sans-serif; font-size:.76rem; font-weight:600;
      transition:background .15s, color .15s;
    }
    .vtog-btn.on { background:rgba(79,142,247,.15); color:var(--accent); }

    .body-content { padding:1.3rem 1.5rem; }
    .body-plain { font-size:.9rem; line-height:1.9; color:var(--text); white-space:pre-wrap; word-break:break-word; }
    .body-frame { width:100%; border:none; min-height:420px; display:block; border-radius:8px; background:var(--frame); }

    .body-skel { padding:1.3rem 1.5rem; }

    .inline-err { padding:1.1rem 1.5rem; display:flex; align-items:center; gap:.55rem; color:var(--danger); font-size:.86rem; }
    .inline-err svg { width:17px; height:17px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; flex-shrink:0; }

    /* ═══════════════════════════════════════ TOAST ═══ */
    .toast-rack { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); z-index:999; display:flex; flex-direction:column-reverse; gap:.4rem; pointer-events:none; }
    .toast {
      display:flex; align-items:center; gap:.55rem;
      background:var(--text); color:var(--bg);
      border-radius:30px; padding:.55rem 1rem;
      font-size:.82rem; font-weight:700; font-family:'Alexandria',sans-serif;
      white-space:nowrap; pointer-events:none;
      box-shadow:0 8px 24px rgba(0,0,0,.3);
      animation:toastIn .3s var(--ease) both;
    }
    .toast.out { animation:toastOut .3s var(--ease) both; }
    @keyframes toastIn  { from{opacity:0;transform:translateY(12px) scale(.9)} to{opacity:1;transform:none} }
    @keyframes toastOut { from{opacity:1;transform:none} to{opacity:0;transform:translateY(8px) scale(.92)} }
    .toast svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }

    /* ═══════════════════════════════════════ RESPONSIVE ═══ */
    @media (max-width:700px) {
      :root { --top-h:54px; --sidebar-w:100%; }

      .logo-name { display:none; }
      .user-email { max-width:115px; }
      .count-pill { display:none; }
      .btn-refresh .label { display:none; }
      .btn-refresh { padding:0 .6rem; }

      .layout { position:relative; overflow:hidden; }

      .sidebar {
        position:absolute; inset:0; width:100%; border:none; z-index:2;
        transform:translateX(0);
        transition:transform .34s var(--ease);
      }
      .sidebar.away { transform:translateX(105%); }

      .viewer {
        position:absolute; inset:0; width:100%;
        transform:translateX(-105%);
        transition:transform .34s var(--ease);
      }
      .viewer.here { transform:translateX(0); }

      .back-btn { display:flex; }
      .viewer-inner { padding:1rem 1rem 2rem; }

      .hdr-subj { font-size:1.05rem; }
      .body-content { padding:.95rem 1rem; }
    }

    @media (min-width:701px) and (max-width:1023px) { :root { --sidebar-w:275px; } }
  </style>
</head>
<body>

<!-- ═══ TOPBAR ═══ -->
<header class="topbar">
  <a class="logo" href="#">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
    </div>
    <span class="logo-name">MailBox</span>
  </a>
  <div class="topbar-sep"></div>
  <div class="user-pill" id="copyMeBtn" title="نسخ بريدك الإلكتروني">
    <div class="user-av" id="userAv"></div>
    <span class="user-email">{{ username }}</span>
    <div class="copy-me-icon">
      <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </div>
  </div>
  <div class="topbar-r">
    <span class="count-pill" id="countPill"></span>
    <button class="btn-refresh" id="refreshBtn" title="تحديث">
      <span class="spin-i"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></span>
      <span class="label">تحديث</span>
    </button>
    <button class="ibtn btn-theme" id="themeBtn" title="تبديل المظهر">
      <svg id="iMoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="iSun"  viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <a class="ibtn btn-logout" href="/logout" title="تسجيل الخروج">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </a>
  </div>
</header>

<!-- ═══ LAYOUT ═══ -->
<div class="layout" id="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-label">البريد الوارد</div>
      <div class="search-wrap">
        <div class="search-ico"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <input id="searchInput" type="text" placeholder="بحث في الرسائل…" autocomplete="off" />
      </div>
    </div>
    <div class="warn-bar" id="warnBar"></div>
    <div class="msg-list" id="msgList">
      <!-- skeletons -->
      <div class="sk-row"><div style="display:flex;gap:.45rem;margin-bottom:.5rem"><div class="sk" style="width:30px;height:30px;border-radius:9px;flex-shrink:0"></div><div style="flex:1"><div class="sk" style="height:11px;width:55%;margin-bottom:7px"></div><div class="sk" style="height:9px;width:85%"></div></div></div><div class="sk" style="height:8px;width:70%;margin-right:38px"></div></div>
      <div class="sk-row"><div style="display:flex;gap:.45rem;margin-bottom:.5rem"><div class="sk" style="width:30px;height:30px;border-radius:9px;flex-shrink:0"></div><div style="flex:1"><div class="sk" style="height:11px;width:63%;margin-bottom:7px"></div><div class="sk" style="height:9px;width:79%"></div></div></div><div class="sk" style="height:8px;width:58%;margin-right:38px"></div></div>
      <div class="sk-row"><div style="display:flex;gap:.45rem;margin-bottom:.5rem"><div class="sk" style="width:30px;height:30px;border-radius:9px;flex-shrink:0"></div><div style="flex:1"><div class="sk" style="height:11px;width:42%;margin-bottom:7px"></div><div class="sk" style="height:9px;width:92%"></div></div></div><div class="sk" style="height:8px;width:74%;margin-right:38px"></div></div>
    </div>
  </aside>

  <!-- VIEWER -->
  <main class="viewer" id="viewer">
    <div class="ph" id="ph">
      <div class="ph-ico"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg></div>
      <h3>اختر رسالة لعرضها</h3>
      <p>انقر على أي رسالة في القائمة<br/>لعرض محتواها هنا</p>
    </div>
  </main>

</div>

<!-- ═══ TOASTS ═══ -->
<div class="toast-rack" id="toastRack"></div>

<script>
(function(){
'use strict';

/* ── State ── */
let allMsgs   = [];
let activeUid = null;
let loading   = false;
const isMob   = () => window.innerWidth <= 700;

/* ── Theme ── */
const html  = document.documentElement;
const moon  = document.getElementById('iMoon');
const sun   = document.getElementById('iSun');
function applyTheme(t){
  html.setAttribute('data-theme', t);
  localStorage.setItem('mb-theme', t);
  moon.style.display = t==='dark'?'block':'none';
  sun.style.display  = t==='light'?'block':'none';
}
applyTheme(localStorage.getItem('mb-theme') || 'dark');
document.getElementById('themeBtn').onclick = () =>
  applyTheme(html.getAttribute('data-theme')==='dark' ? 'light' : 'dark');

/* ── User avatar initials + copy my email ── */
const emailStr = document.querySelector('.user-email').textContent.trim();
document.getElementById('userAv').textContent = emailStr[0].toUpperCase();
document.getElementById('copyMeBtn').addEventListener('click', () =>
  copyText(emailStr, 'بريدك الإلكتروني'));

/* ── Avatar colour ── */
const COLS = ['#4f8ef7','#7c5ef5','#00c9a7','#f2994a','#e84393','#06b6d4','#8b5cf6','#f59e0b','#10b981','#ef4444'];
function aColor(s){ let h=0; for(let c of s) h=c.charCodeAt(0)+((h<<5)-h); return COLS[Math.abs(h)%COLS.length]; }
function aInit(n,a){
  const s = (n||a||'?').trim().split(/\s+/);
  return s.length>=2 ? (s[0][0]+s[1][0]).toUpperCase() : s[0].slice(0,2).toUpperCase();
}

/* ── Escape HTML ── */
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stripHtml(h){ const d=document.createElement('div'); d.innerHTML=h; return d.textContent||d.innerText||''; }

/* ── Toast ── */
function toast(msg, icon='✓'){
  const rack = document.getElementById('toastRack');
  const el   = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> ${esc(msg)}`;
  rack.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(()=>el.remove(), 300); }, 2200);
}

/* ── Copy to clipboard ── */
async function copyText(text, label){
  try {
    await navigator.clipboard.writeText(text);
    toast(`تم نسخ ${label}`);
  } catch(_){
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast(`تم نسخ ${label}`);
  }
}

/* ── Mobile panel nav ── */
function goViewer(){ if(!isMob()) return; document.getElementById('sidebar').classList.add('away'); document.getElementById('viewer').classList.add('here'); }
function goSidebar(){ document.getElementById('sidebar').classList.remove('away'); document.getElementById('viewer').classList.remove('here'); }

/* Touch swipe */
let tx=0, ty=0;
document.getElementById('viewer').addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
document.getElementById('viewer').addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - tx;
  const dy = Math.abs(e.changedTouches[0].clientY - ty);
  if(dx > 60 && dy < 40 && isMob()) goSidebar();
}, {passive:true});

/* ── Verification code detection ── */
function detectCode(rawText){
  // ── Step 1: strip invisible / zero-width unicode characters used by mailers
  //    to break spam filters (U+034F, U+00AD soft hyphen, U+200x, etc.)
  let t = rawText
    .replace(/[\u00AD\u034F\u200B\u200C\u200D\u2060\uFEFF]/g, '')
    .replace(/[ \t]{2,}/g, ' ');        // collapse repeated spaces

  // ── Step 2: strip noise that harbours false-positive digit sequences ──
  t = t
    .replace(/https?:\/\/\S+/gi,  ' ')  // URLs
    .replace(/[\w.-]+@[\w.-]+\.\w{2,}/gi, ' ')  // email addresses
    // UUIDs: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    .replace(/\b[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}\b/gi, ' ')
    // Long tokens starting with a LETTER followed by 7+ word chars
    // (strips internal identifiers like "Saisissez", "identifier", "b016bddf194b")
    .replace(/[A-Za-z]\w{7,}/g, ' ')
    // Mixed tokens: digit immediately adjacent to letters (e.g. "653956AC", "b0f8506c")
    .replace(/\d+[A-Za-z]\w*/g, ' ')
    .replace(/[A-Za-z]\w*\d\w{3,}/g, ' ');

  // ── Step 3: a line that is ONLY a 4–8 digit number ──
  // This is the most common OTP format (code on its own line)
  const lines = t.split(/[\r\n]+/).map(l => l.trim()).filter(Boolean);
  for(const line of lines){
    if(/^\d{4,8}$/.test(line)) return line;
  }

  // ── Step 4: per-line scan — keyword AND standalone number on the SAME line ──
  // Works for "Saisissez ce code pour vous identifier 4879" and similar.
  const KW = /\b(?:code|رمز|كود|تحقق|pin|otp|passcode|verification|verify|confirm|saisissez|entrez|enter|sign.?in|access|security|secret|token)\b/i;
  for(const line of lines){
    if(KW.test(line)){
      // Find a standalone 4-8 digit number anywhere on this line
      for(const m of line.matchAll(/\b(\d{4,8})\b/g)){
        return m[1];
      }
    }
  }

  // ── Step 5: sliding window — keyword line N, number appears within next 3 lines ──
  for(let i = 0; i < lines.length; i++){
    if(KW.test(lines[i])){
      for(let j = i+1; j <= Math.min(i+3, lines.length-1); j++){
        const m = lines[j].match(/^\s*(\d{4,8})\s*$/);
        if(m) return m[1];
      }
    }
  }

  // ── Nothing matched — do NOT show the banner ──
  return null;
}

/* ── Load messages ── */
async function loadMessages(){
  if(loading) return;
  loading = true;
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin'); btn.disabled = true;

  try {
    const r    = await fetch('/api/messages', { cache:'no-store' });
    const data = await r.json();
    if(data.error) throw new Error(data.error);

    allMsgs = data.messages;
    renderList(allMsgs);
    updatePill(data.total);

    const wb = document.getElementById('warnBar');
    if(data.warning){ wb.textContent = '⚠️ '+data.warning; wb.classList.add('show'); }
    else              wb.classList.remove('show');

    if(activeUid) highlightActive();
  } catch(e){ showErr(e.message); }
  finally { btn.classList.remove('spin'); btn.disabled=false; loading=false; }
}

/* ── Render list ── */
function renderList(msgs){
  const list = document.getElementById('msgList');
  if(!msgs.length){
    list.innerHTML = `<div class="empty"><div class="ei">📭</div><p>لا توجد رسائل في هذا الصندوق</p></div>`;
    return;
  }
  list.innerHTML = msgs.map((m,i)=>{
    const av  = aInit(m.sender_name, m.sender_addr);
    const col = aColor(m.sender_addr||m.sender_name||m.uid);
    const act = m.uid===activeUid;
    const code = detectCode(m.preview||'');
    return `
      <div class="msg-row${act?' active':''}" data-uid="${esc(m.uid)}" style="animation-delay:${Math.min(i*22,200)}ms">
        <div class="row-top">
          <div class="row-left">
            <div class="av" style="background:${col}">${esc(av)}</div>
            <div class="row-sender">${esc(m.sender_name||m.sender_addr)}</div>
          </div>
          <div class="row-date">${esc(m.date)}</div>
        </div>
        <div class="row-subj">${esc(m.subject)}</div>
        <div class="row-prev">${esc(m.preview)}</div>
        ${code ? `<div class="code-badge"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${esc(code)}</div>` : ''}
      </div>`;
  }).join('');

  list.querySelectorAll('.msg-row').forEach(row =>
    row.addEventListener('click', ()=> openMessage(row.dataset.uid)));
}

function highlightActive(){
  document.querySelectorAll('.msg-row').forEach(r =>
    r.classList.toggle('active', r.dataset.uid===activeUid));
}

/* ── Search ── */
document.getElementById('searchInput').addEventListener('input', function(){
  const q = this.value.toLowerCase();
  renderList(q ? allMsgs.filter(m =>
    m.subject.toLowerCase().includes(q) ||
    (m.sender_name||'').toLowerCase().includes(q) ||
    (m.sender_addr||'').toLowerCase().includes(q) ||
    (m.preview||'').toLowerCase().includes(q)
  ) : allMsgs);
});

/* ── Open message ── */
async function openMessage(uid){
  if(!uid) return;
  activeUid = uid;
  highlightActive();
  if(isMob()) goViewer();

  const meta   = allMsgs.find(m=>m.uid===uid);
  const viewer = document.getElementById('viewer');

  if(!meta){
    viewer.innerHTML=`<div class="ph"><p style="color:var(--danger)">رسالة غير موجودة</p></div>`;
    return;
  }

  const av  = aInit(meta.sender_name, meta.sender_addr);
  const col = aColor(meta.sender_addr||meta.sender_name||uid);

  viewer.innerHTML = `
    <div class="viewer-inner">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        الرسائل
      </button>

      <!-- Code detection banner (shown if code found) -->
      <div class="code-banner" id="codeBanner">
        <div class="cb-icon"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01"/><path d="M17 12h.01"/><path d="M7 12h.01"/></svg></div>
        <div class="cb-body">
          <div class="cb-label">🔐 تم اكتشاف رمز تحقق</div>
          <div class="cb-code" id="cbCodeVal"></div>
        </div>
        <button class="cb-copy" id="cbCopyBtn">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          نسخ
        </button>
      </div>

      <div class="hdr-card">
        <div class="hdr-subj">${esc(meta.subject)}</div>
        <div class="hdr-row">
          <div class="from-chip">
            <div class="av av-sm" style="background:${col};width:20px;height:20px;border-radius:6px;font-size:.56rem">${esc(av)}</div>
            <span class="fname">${esc(meta.sender_name||meta.sender_addr)}</span>
            ${meta.sender_name ? `<span class="faddr">&lt;${esc(meta.sender_addr)}&gt;</span>` : ''}
          </div>
          <span class="hdr-date">${esc(meta.date)}</span>
        </div>
      </div>

      <div class="body-card" id="bodyCard">
        <div class="body-bar">
          <div class="view-tog" id="viewTog">
            <button class="vtog-btn on" id="btnHtml">HTML</button>
            <button class="vtog-btn"    id="btnPlain">نص عادي</button>
          </div>
        </div>
        <div class="body-skel" id="bc">
          <div class="sk" style="height:12px;width:78%;margin-bottom:13px"></div>
          <div class="sk" style="height:10px;width:100%;margin-bottom:9px"></div>
          <div class="sk" style="height:10px;width:64%;margin-bottom:9px"></div>
          <div class="sk" style="height:10px;width:88%;margin-bottom:9px"></div>
          <div class="sk" style="height:10px;width:52%"></div>
        </div>
      </div>
    </div>`;

  document.getElementById('backBtn').addEventListener('click', goSidebar);
  document.getElementById('btnHtml').addEventListener('click', showHtml);
  document.getElementById('btnPlain').addEventListener('click', showPlain);

  /* fetch body */
  try {
    const r    = await fetch('/api/message/'+encodeURIComponent(uid), { cache:'no-store' });
    const data = await r.json();
    if(data.error) throw new Error(data.error);
    if(activeUid!==uid) return;
    renderBody(data.body, data.body_type);
  } catch(e){
    if(activeUid!==uid) return;
    const bc = document.getElementById('bc');
    if(bc) bc.innerHTML=`<div class="inline-err"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>${esc(e.message)}</div>`;
  }
}

/* ── Render body ── */
function renderBody(body, type){
  const bc  = document.getElementById('bc');
  const tog = document.getElementById('viewTog');
  if(!bc) return;

  /* detect code from plain text of email */
  const plain = stripHtml(body);
  const code  = detectCode(plain);
  if(code){
    const banner = document.getElementById('codeBanner');
    const val    = document.getElementById('cbCodeVal');
    if(banner && val){
      val.textContent = code;
      banner.classList.add('show');
      document.getElementById('cbCopyBtn').addEventListener('click', ()=>{
        copyText(code, 'الرمز '+code);
      });
    }
  }

  if(type==='html'){
    tog.style.display='flex';
    bc.className='body-content';

    /* Inject <base target="_blank"> so all links/buttons open in new tab */
    let modBody = body;
    if(!/<base/i.test(modBody)){
      const baseTag = '<base target="_blank" rel="noopener noreferrer">';
      if(/<head[\s>]/i.test(modBody))
        modBody = modBody.replace(/<head([\s>])/i, '<head$1'+baseTag);
      else
        modBody = baseTag + modBody;
    }

    bc.innerHTML=`
      <iframe id="htmlFrame" class="body-frame"
        sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
      <div id="plainFb" class="body-plain" style="display:none"></div>`;

    const fr = document.getElementById('htmlFrame');
    fr.addEventListener('load', ()=>{
      try { fr.style.height=Math.max(fr.contentDocument.documentElement.scrollHeight,420)+'px'; } catch(_){}
    });
    fr.srcdoc = modBody;
    document.getElementById('plainFb').textContent = plain;
  } else {
    tog.style.display='none';
    bc.className='body-content';
    bc.innerHTML=`<div class="body-plain">${esc(body)}</div>`;
  }
}

function showHtml(){
  document.getElementById('htmlFrame').style.display='block';
  document.getElementById('plainFb').style.display='none';
  document.getElementById('btnHtml').classList.add('on');
  document.getElementById('btnPlain').classList.remove('on');
}
function showPlain(){
  document.getElementById('htmlFrame').style.display='none';
  document.getElementById('plainFb').style.display='block';
  document.getElementById('btnPlain').classList.add('on');
  document.getElementById('btnHtml').classList.remove('on');
}

/* ── Helpers ── */
function updatePill(n){
  const p=document.getElementById('countPill');
  p.textContent=n+' رسالة'; p.classList.add('vis');
}
function showErr(msg){
  document.getElementById('msgList').innerHTML=
    `<div class="empty"><div class="ei">⚠️</div><p>${esc(msg)}</p></div>`;
}

/* ── Resize ── */
window.addEventListener('resize', ()=>{
  if(!isMob()){
    document.getElementById('sidebar').classList.remove('away');
    document.getElementById('viewer').classList.remove('here');
  }
});

/* ── Refresh btn ── */
document.getElementById('refreshBtn').addEventListener('click', loadMessages);

/* ── Boot ── */
loadMessages();

})();
</script>
</body>
</html>
