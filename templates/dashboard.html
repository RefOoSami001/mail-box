<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Farouk Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --accent:#4f8ef7;--accent2:#7c5ef5;--green:#22c55e;--teal:#00c9a7;
      --amber:#f59e0b;--danger:#f25f7a;
      --sidebar-w:400px;--top-h:60px;--radius:14px;--radius-sm:9px;
      --ease:cubic-bezier(.4,0,.2,1);
    }
    [data-theme="dark"]{
      --bg:#06090f;--surf:#0d1525;--surf2:#121e30;--surf3:#1a2840;
      --border:rgba(255,255,255,.07);--bord2:rgba(255,255,255,.12);
      --text:#e2e8f4;--text2:#7d8fa8;--text3:#3d4f66;
      --glow:rgba(79,142,247,.18);--shadow:0 24px 60px rgba(0,0,0,.6);
    }
    [data-theme="light"]{
      --bg:#f1f5fb;--surf:#ffffff;--surf2:#f7f9fd;--surf3:#edf1f8;
      --border:rgba(0,0,0,.07);--bord2:rgba(0,0,0,.12);
      --text:#0f172a;--text2:#475569;--text3:#94a3b8;
      --shadow:0 24px 60px rgba(0,0,0,.12);
    }
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Alexandria',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background .3s,color .3s;}

    .topbar{
      height:var(--top-h);flex-shrink:0;z-index:40;
      background:var(--surf);border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 1rem;gap:.65rem;position:relative;
    }
    .topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);opacity:.35;}
    .logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;flex-shrink:0;}
    .logo-mark{width:32px;height:32px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(79,142,247,.4);}
    .logo-mark svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
    .logo-name{font-size:1.1rem;font-weight:800;letter-spacing:-.03em;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .topbar-sep{width:1px;height:22px;background:var(--bord2);flex-shrink:0;}
    .user-pill{display:flex;align-items:center;gap:.45rem;flex:1;min-width:0;background:var(--surf2);border:1px solid var(--border);border-radius:20px;padding:.25rem .6rem .25rem .28rem;}
    .user-av{width:22px;height:22px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#fff;}
    .user-name{font-size:.78rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .topbar-r{display:flex;align-items:center;gap:.4rem;flex-shrink:0;}
    .count-pill{font-size:.72rem;font-weight:700;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.22);color:var(--accent);border-radius:20px;padding:.2rem .65rem;opacity:0;transition:opacity .3s;white-space:nowrap;}
    .count-pill.vis{opacity:1;}
    .ibtn{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--surf2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);flex-shrink:0;transition:background .18s,color .18s,transform .12s;text-decoration:none;}
    .ibtn:hover{background:var(--surf3);color:var(--text);}
    .ibtn:active{transform:scale(.93);}
    .ibtn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .ibtn-logout:hover{background:rgba(242,95,122,.1);color:var(--danger);border-color:rgba(242,95,122,.25);}
    .btn-fetch{display:flex;align-items:center;gap:.4rem;height:34px;padding:0 .9rem;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;color:#fff;font-family:'Alexandria',sans-serif;font-size:.8rem;font-weight:700;white-space:nowrap;flex-shrink:0;transition:opacity .2s,transform .12s;box-shadow:0 3px 12px rgba(79,142,247,.3);}
    .btn-fetch:hover:not(:disabled){opacity:.88;}
    .btn-fetch:disabled{opacity:.45;cursor:not-allowed;}
    .btn-fetch svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
    .spin-ico{animation:spinA .6s linear infinite;}
    @keyframes spinA{to{transform:rotate(360deg);}}

    .layout{display:flex;flex:1;overflow:hidden;min-height:0;}

    .sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--surf);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:background .3s;}

    /* My emails panel */
    .my-emails-panel{padding:.65rem 1rem .6rem;border-bottom:1px solid var(--border);flex-shrink:0;max-height:280px;display:flex;flex-direction:column;gap:.4rem;}
    .my-emails-header{display:flex;align-items:center;gap:.45rem;flex-shrink:0;}
    .my-emails-label{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;gap:.35rem;}
    .my-emails-label svg{width:11px;height:11px;fill:none;stroke:var(--teal);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .my-emails-count{margin-right:auto;font-size:.65rem;color:var(--text3);background:var(--surf2);border-radius:10px;padding:.1rem .45rem;}
    .my-emails-search{flex-shrink:0;position:relative;}
    .my-emails-search input{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.38rem .75rem .38rem 1.85rem;color:var(--text);font-family:'Alexandria',sans-serif;font-size:.76rem;outline:none;transition:border-color .2s;}
    .my-emails-search input:focus{border-color:rgba(0,201,167,.35);}
    .my-emails-search input::placeholder{color:var(--text3);}
    .my-emails-search-ico{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;display:flex;}
    .my-emails-search-ico svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    /* Email table */
    .my-emails-table-wrap{overflow-y:auto;flex:1;border:1px solid var(--border);border-radius:var(--radius-sm);}
    .my-emails-table-wrap::-webkit-scrollbar{width:3px;}
    .my-emails-table-wrap::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:3px;}
    .my-emails-tbl{width:100%;border-collapse:collapse;font-size:.78rem;}
    .my-emails-tbl thead{position:sticky;top:0;background:var(--surf);z-index:1;}
    .my-emails-tbl th{padding:.32rem .6rem;text-align:right;font-size:.6rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;}
    .my-emails-tbl td{padding:.46rem .6rem;border-bottom:1px solid var(--border);vertical-align:middle;}
    .my-emails-tbl tr:last-child td{border-bottom:none;}
    .my-emails-tbl tr:hover td{background:var(--surf2);}
    .em-select-btn{display:inline-flex;align-items:center;gap:.22rem;padding:.22rem .52rem;border-radius:6px;border:1px solid var(--border);background:var(--surf2);cursor:pointer;font-size:.7rem;font-weight:600;font-family:'Alexandria',sans-serif;color:var(--text3);white-space:nowrap;transition:background .15s,color .15s,border-color .15s;}
    .em-select-btn:hover{background:rgba(0,201,167,.1);color:var(--teal);border-color:rgba(0,201,167,.3);}
    .em-select-btn.em-active{background:rgba(0,201,167,.15);color:var(--teal);border-color:rgba(0,201,167,.4);font-weight:700;}
    .em-select-btn svg{width:10px;height:10px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
    .em-date-range{font-size:.68rem;color:var(--text3);white-space:nowrap;}
    .no-emails-hint{font-size:.74rem;color:var(--text3);padding:.1rem 0;}

    .search-panel{padding:.85rem 1rem .75rem;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:.55rem;}
    .panel-label{font-size:.64rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);}
    .email-wrap{position:relative;}
    .email-wrap input{
      width:100%;background:var(--surf2);border:1px solid var(--bord2);border-radius:var(--radius-sm);
      padding:.65rem 2.2rem .65rem .9rem;color:var(--text);font-family:'Alexandria',sans-serif;
      font-size:.88rem;outline:none;transition:border-color .2s,background .2s;
    }
    .email-wrap input:focus{border-color:rgba(79,142,247,.5);background:var(--surf3);}
    .email-wrap input::placeholder{color:var(--text3);}
    .email-ico{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;display:flex;}
    .email-ico svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

    .cat-btn{
      width:100%;display:flex;align-items:center;gap:.55rem;
      background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius-sm);
      padding:.62rem .85rem;cursor:pointer;color:var(--text2);font-family:'Alexandria',sans-serif;
      font-size:.86rem;font-weight:500;text-align:right;transition:border-color .2s,background .2s,color .2s;
    }
    .cat-btn:hover{background:var(--surf3);color:var(--text);}
    .cat-btn.selected{border-color:rgba(79,142,247,.4);color:var(--text);}
    .cat-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
    .cat-btn .cat-caret{margin-right:auto;opacity:.5;flex-shrink:0;}
    .cat-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;display:none;}
    .cat-btn.selected .cat-dot{display:block;}

    .fetch-btn-full{
      width:100%;padding:.7rem;border-radius:var(--radius-sm);
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none;cursor:pointer;color:#fff;font-family:'Alexandria',sans-serif;
      font-size:.88rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:.45rem;
      transition:opacity .2s;box-shadow:0 4px 16px rgba(79,142,247,.28);
    }
    .fetch-btn-full:hover:not(:disabled){opacity:.88;}
    .fetch-btn-full:disabled{opacity:.45;cursor:not-allowed;}
    .fetch-btn-full svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}

    .results-head{padding:.6rem 1rem .5rem;border-bottom:1px solid var(--border);flex-shrink:0;}
    .search-wrap{position:relative;}
    .search-wrap input{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.52rem 1.9rem .52rem .85rem;color:var(--text);font-family:'Alexandria',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s;}
    .search-wrap input:focus{border-color:rgba(79,142,247,.4);}
    .search-wrap input::placeholder{color:var(--text3);}
    .search-ico{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;display:flex;}
    .search-ico svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

    .warn-bar{margin:.3rem .5rem 0;padding:.4rem .75rem;background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.22);border-radius:8px;font-size:.73rem;color:var(--amber);line-height:1.4;display:none;}
    .warn-bar.show{display:block;}

    .msg-list{flex:1;overflow-y:auto;padding:.3rem .4rem;}
    .msg-list::-webkit-scrollbar{width:3px;}
    .msg-list::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:3px;}

    .msg-row{padding:.78rem .82rem;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;margin-bottom:2px;position:relative;transition:background .15s,border-color .15s;animation:rowIn .28s var(--ease) both;}
    @keyframes rowIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
    .msg-row:hover{background:var(--surf2);}
    .msg-row.active{background:rgba(79,142,247,.08);border-color:rgba(79,142,247,.2);}
    .msg-row.active::after{content:'';position:absolute;right:0;top:18%;bottom:18%;width:3px;border-radius:3px;background:linear-gradient(180deg,var(--accent),var(--accent2));}
    .row-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.4rem;margin-bottom:.26rem;}
    .row-left{display:flex;align-items:center;gap:.42rem;min-width:0;}
    .av{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:#fff;}
    .row-sender{font-size:.83rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .row-date{font-size:.68rem;color:var(--text3);flex-shrink:0;white-space:nowrap;}
    .row-subj{font-size:.78rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.18rem;padding-right:38px;}
    .row-prev{font-size:.72rem;color:var(--text3);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5;padding-right:38px;}
    .code-badge{display:inline-flex;align-items:center;gap:.28rem;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green);border-radius:6px;padding:.14rem .44rem;font-size:.68rem;font-weight:700;margin-top:.28rem;margin-right:38px;}

    .sk{background:linear-gradient(90deg,var(--surf2) 25%,var(--surf3) 50%,var(--surf2) 75%);background-size:200% 100%;animation:shimmer 1.4s ease infinite;border-radius:5px;}
    @keyframes shimmer{to{background-position:-200% 0;}}
    .sk-row{padding:.78rem .82rem;margin-bottom:2px;}

    .state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:.65rem;padding:1.5rem;text-align:center;color:var(--text3);}
    .state-box .ei{font-size:2.2rem;opacity:.35;}
    .state-box p{font-size:.82rem;line-height:1.65;}

    .viewer{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;transition:background .3s;min-width:0;}
    .viewer::-webkit-scrollbar{width:4px;}
    .viewer::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:4px;}
    .ph{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;color:var(--text3);padding:2rem;}
    .ph-ico{width:72px;height:72px;border-radius:20px;background:var(--surf);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;}
    .ph-ico svg{width:30px;height:30px;fill:none;stroke:var(--text3);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
    .ph h3{font-size:1rem;font-weight:600;color:var(--text2);text-align:center;}
    .ph p{font-size:.83rem;color:var(--text3);text-align:center;line-height:1.6;}
    .viewer-inner{padding:1.5rem 1.8rem;max-width:820px;width:100%;align-self:center;}
    .back-btn{display:none;align-items:center;gap:.4rem;font-size:.82rem;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;margin-bottom:1rem;font-family:'Alexandria',sans-serif;}
    .back-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}

    .code-banner{display:none;align-items:center;gap:.75rem;background:linear-gradient(135deg,rgba(34,197,94,.12),rgba(0,201,167,.08));border:1px solid rgba(34,197,94,.3);border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:1rem;animation:fadeUp .22s var(--ease) both;}
    .code-banner.show{display:flex;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
    .cb-icon{width:38px;height:38px;border-radius:10px;background:rgba(34,197,94,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .cb-icon svg{width:18px;height:18px;fill:none;stroke:var(--green);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
    .cb-body{flex:1;min-width:0;}
    .cb-label{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--green);margin-bottom:.2rem;}
    .cb-code{font-size:1.55rem;font-weight:800;letter-spacing:.18em;color:var(--text);font-variant-numeric:tabular-nums;}
    .cb-copy{display:flex;align-items:center;gap:.4rem;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:.45rem .8rem;cursor:pointer;color:var(--green);font-family:'Alexandria',sans-serif;font-size:.78rem;font-weight:700;white-space:nowrap;flex-shrink:0;transition:background .18s;}
    .cb-copy:hover{background:rgba(34,197,94,.26);}
    .cb-copy svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}

    .hdr-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.4rem 1.1rem;margin-bottom:1rem;animation:fadeUp .22s var(--ease) both;}
    .hdr-subj{font-size:1.12rem;font-weight:700;letter-spacing:-.02em;line-height:1.4;margin-bottom:.8rem;}
    .hdr-row{display:flex;align-items:center;flex-wrap:wrap;gap:.5rem;}
    .from-chip{display:flex;align-items:center;gap:.4rem;background:var(--surf2);border:1px solid var(--border);border-radius:20px;padding:.28rem .65rem .28rem .28rem;}
    .from-chip .fname{font-size:.8rem;font-weight:600;color:var(--text);}
    .from-chip .faddr{font-size:.72rem;color:var(--text3);}
    .hdr-date{font-size:.74rem;color:var(--text3);margin-right:auto;}
    .body-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:fadeUp .28s var(--ease) .06s both;}
    .body-bar{display:flex;align-items:center;padding:.5rem .9rem;border-bottom:1px solid var(--border);gap:.4rem;min-height:40px;}
    .view-tog{display:none;background:var(--surf2);border:1px solid var(--border);border-radius:7px;overflow:hidden;}
    .vtog-btn{padding:.28rem .7rem;background:none;border:none;cursor:pointer;color:var(--text3);font-family:'Alexandria',sans-serif;font-size:.76rem;font-weight:600;transition:background .15s,color .15s;}
    .vtog-btn.on{background:rgba(79,142,247,.15);color:var(--accent);}
    .body-content{padding:1.2rem 1.5rem;}
    .body-plain{font-size:.9rem;line-height:1.9;color:var(--text);white-space:pre-wrap;word-break:break-word;}
    .body-frame{width:100%;border:none;min-height:420px;display:block;border-radius:8px;background:#fff;}
    .body-skel{padding:1.2rem 1.5rem;}
    .inline-err{padding:1rem 1.5rem;display:flex;align-items:center;gap:.5rem;color:var(--danger);font-size:.86rem;}
    .inline-err svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;flex-shrink:0;}

    .cat-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;}
    .cat-overlay.show{display:flex;}
    .cat-sheet{background:var(--surf);border:1px solid var(--bord2);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:1.4rem 1.2rem 2rem;animation:sheetUp .3s var(--ease) both;}
    @keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
    .cat-sheet-title{font-size:.95rem;font-weight:700;margin-bottom:1rem;text-align:center;color:var(--text2);}
    .cat-list{display:flex;flex-direction:column;gap:.45rem;}
    .cat-option{display:flex;align-items:center;gap:.75rem;background:var(--surf2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem 1rem;cursor:pointer;transition:background .15s,border-color .15s;}
    .cat-option:hover{background:var(--surf3);}
    .cat-option.chosen{border-color:rgba(79,142,247,.4);background:rgba(79,142,247,.07);}
    .cat-option-icon{width:36px;height:36px;border-radius:10px;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem;}
    .cat-option-body{flex:1;min-width:0;}
    .cat-option-label{font-size:.9rem;font-weight:700;color:var(--text);}
    .cat-option-desc{font-size:.75rem;color:var(--text3);margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cat-option.chosen .cat-option-icon{background:rgba(79,142,247,.2);border-color:rgba(79,142,247,.35);}
    .cat-cancel{width:100%;margin-top:.9rem;padding:.65rem;border-radius:var(--radius-sm);background:var(--surf2);border:1px solid var(--border);cursor:pointer;color:var(--text3);font-family:'Alexandria',sans-serif;font-size:.86rem;font-weight:600;transition:background .15s,color .15s;}
    .cat-cancel:hover{background:var(--surf3);color:var(--text);}

    .toast-rack{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column-reverse;gap:.4rem;pointer-events:none;}
    .toast{display:flex;align-items:center;gap:.5rem;background:var(--text);color:var(--bg);border-radius:30px;padding:.55rem 1rem;font-size:.82rem;font-weight:700;font-family:'Alexandria',sans-serif;white-space:nowrap;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:toastIn .3s var(--ease) both;}
    .toast.err{background:var(--danger);color:#fff;}
    .toast.out{animation:toastOut .3s var(--ease) both;}
    @keyframes toastIn{from{opacity:0;transform:translateY(12px) scale(.9)}to{opacity:1;transform:none}}
    @keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(8px) scale(.92)}}

    @media(max-width:680px){
      :root{--top-h:52px;--sidebar-w:100%;}
      .logo-name{display:none;}
      .layout{position:relative;overflow:hidden;}
      .sidebar{position:absolute;inset:0;z-index:2;width:100%;transition:transform .32s var(--ease);}
      .sidebar.away{transform:translateX(108%);}
      .viewer{position:absolute;inset:0;width:100%;transform:translateX(-108%);transition:transform .32s var(--ease);}
      .viewer.here{transform:translateX(0);}
      .back-btn{display:flex;}
      .viewer-inner{padding:1rem 1rem 2.5rem;}
    }
    @media(min-width:681px) and (max-width:1023px){:root{--sidebar-w:280px;}}
  </style>
</head>
<body>

<header class="topbar">
  <a class="logo" href="#">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg></div>
    <span class="logo-name">Farouk Account</span>
  </a>
  <div class="topbar-sep"></div>
  <div class="user-pill">
    <div class="user-av" id="userAv"></div>
    <span class="user-name">{{ display }}</span>
  </div>
  <div class="topbar-r">
    <span class="count-pill" id="countPill"></span>
    <button class="ibtn" id="themeBtn">
      <svg id="iMoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg id="iSun" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
    </button>
    <a class="ibtn ibtn-logout" href="/logout" title="تسجيل الخروج">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </a>
  </div>
</header>

<div class="layout" id="layout">
  <aside class="sidebar" id="sidebar">

    <!-- My Emails strip -->
    <div class="my-emails-panel" id="myEmailsPanel" style="display:none">
      <div class="my-emails-header">
        <div class="my-emails-label">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
          حسابات العميل
        </div>
        <span class="my-emails-count" id="myEmailsCount"></span>
      </div>
      <div class="my-emails-search" id="myEmailsSearchWrap" style="display:none">
        <div class="my-emails-search-ico"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
        <input id="myEmailsFilter" placeholder="فلترة…" autocomplete="off"/>
      </div>
      <div class="my-emails-table-wrap" id="myEmailsTableWrap">
        <table class="my-emails-tbl">
          <thead>
            <tr>
              <th>#</th>
              <th>البريد الإلكتروني</th>
              <th>الصلاحية</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="myEmailsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Email input + category selector -->
    <div class="search-panel">
      <div class="panel-label">استعلام البريد</div>
      <div class="email-wrap">
        <div class="email-ico"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg></div>
        <input id="emailInput" type="email" placeholder="أدخل عنوان البريد الإلكتروني" autocomplete="off" />
      </div>
      <button class="cat-btn" id="catBtn">
        <svg viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        <span id="catBtnLabel">اختر نوع الرسائل…</span>
        <div class="cat-dot"></div>
        <svg class="cat-caret" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <button class="fetch-btn-full" id="fetchBtn" disabled>
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span id="fetchLabel">جلب الرسائل</span>
      </button>
    </div>

    <div class="warn-bar" id="warnBar"></div>

    <div id="resultsArea" style="display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;">
      <div class="state-box">
        <div class="ei">📬</div>
        <p>أدخل البريد الإلكتروني<br/>واختر نوع الرسائل<br/>ثم اضغط <strong>جلب الرسائل</strong></p>
      </div>
    </div>

  </aside>

  <main class="viewer" id="viewer">
    <div class="ph" id="ph">
      <div class="ph-ico"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg></div>
      <h3>اختر رسالة لعرضها</h3>
      <p>ستظهر تفاصيل الرسالة هنا</p>
    </div>
  </main>
</div>

<div class="cat-overlay" id="catOverlay">
  <div class="cat-sheet" id="catSheet">
    <div class="cat-sheet-title">اختر نوع الرسائل</div>
    <div class="cat-list" id="catList">
      <div class="state-box" style="min-height:80px;"><p>جارٍ تحميل الفئات…</p></div>
    </div>
    <button class="cat-cancel" id="catCancelBtn">إلغاء</button>
  </div>
</div>

<div class="toast-rack" id="toastRack"></div>

<script>
(function(){
'use strict';

/* ── Theme ── */
const html=document.documentElement;
const moon=document.getElementById('iMoon'),sun=document.getElementById('iSun');
function applyTheme(t){html.setAttribute('data-theme',t);localStorage.setItem('mb-theme',t);moon.style.display=t==='dark'?'block':'none';sun.style.display=t==='light'?'block':'none';}
applyTheme(localStorage.getItem('mb-theme')||'dark');
document.getElementById('themeBtn').onclick=()=>applyTheme(html.getAttribute('data-theme')==='dark'?'light':'dark');

/* ── Avatar ── */
const display='{{ display }}';
document.getElementById('userAv').textContent=display[0].toUpperCase();

/* ── Toast ── */
function toast(msg,isErr=false){
  const rack=document.getElementById('toastRack');
  const el=document.createElement('div');el.className='toast'+(isErr?' err':'');el.textContent=msg;
  rack.appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300);},2500);
}

/* ── Escape ── */
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── Mobile nav ── */
const isMob=()=>window.innerWidth<=680;
function goViewer(){if(!isMob())return;document.getElementById('sidebar').classList.add('away');document.getElementById('viewer').classList.add('here');}
function goSidebar(){document.getElementById('sidebar').classList.remove('away');document.getElementById('viewer').classList.remove('here');}
let tx=0,ty=0;
document.getElementById('viewer').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('viewer').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;const dy=Math.abs(e.changedTouches[0].clientY-ty);if(dx>55&&dy<40&&isMob())goSidebar();},{passive:true});

/* ── Colours ── */
const COLS=['#4f8ef7','#7c5ef5','#00c9a7','#f2994a','#e84393','#06b6d4','#8b5cf6','#f59e0b','#10b981','#ef4444'];
function aColor(s){let h=0;for(let c of s)h=c.charCodeAt(0)+((h<<5)-h);return COLS[Math.abs(h)%COLS.length];}
function aInit(n,a){const s=(n||a||'?').trim().split(/\s+/);return s.length>=2?(s[0][0]+s[1][0]).toUpperCase():s[0].slice(0,2).toUpperCase();}

/* ── Code detection ── */
function detectCode(raw){
  let t=(raw||'').replace(/[\u00AD\u200B\u200C\u200D\u2060\uFEFF]/g,'').replace(/[ \t]{2,}/g,' ');
  t=t.replace(/https?:\/\/\S+/gi,' ').replace(/[\w.-]+@[\w.-]+\.\w{2,}/gi,' ');
  const lines=t.split(/[\r\n]+/).map(l=>l.trim()).filter(Boolean);
  for(const line of lines){if(/^\d{4,8}$/.test(line))return line;}
  const KW=/\b(?:code|رمز|كود|تحقق|pin|otp|passcode|verification|verify|confirm|sign.?in|access|security|secret|token|saisissez|entrez)\b/i;
  for(const line of lines){if(KW.test(line)){for(const m of line.matchAll(/\b(\d{4,8})\b/g))return m[1];}}
  for(let i=0;i<lines.length;i++){if(KW.test(lines[i])){for(let j=i+1;j<=Math.min(i+3,lines.length-1);j++){const m=lines[j].match(/^\s*(\d{4,8})\s*$/);if(m)return m[1];}}}
  return null;
}

/* ── State ── */
let categories=[], selectedCatId=null, selectedCatLabel='الكل';
let allMsgs=[], activeUid=null, fetchBusy=false;
let myEmails=[];

/* ── My Emails ── */
async function loadMyEmails(){
  try{
    const r=await fetch('/api/my-emails');
    const d=await r.json();
    myEmails=d.emails||[];
    renderMyEmails();
  }catch(e){
    myEmails=[];
  }
}

function emFmtRange(start,end){
  if(!start&&!end)return'<span style="color:var(--text3)">—</span>';
  const fmt=s=>{try{return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit'});}catch{return s;}};
  if(start&&end)return`${fmt(start)} ← ${fmt(end)}`;
  if(start)return`من ${fmt(start)}`;
  return`حتى ${fmt(end)}`;
}

function renderMyEmails(){
  const panel=document.getElementById('myEmailsPanel');
  const searchWrap=document.getElementById('myEmailsSearchWrap');
  const countEl=document.getElementById('myEmailsCount');
  if(!myEmails.length){panel.style.display='none';return;}
  panel.style.display='flex';
  countEl.textContent=myEmails.length;
  searchWrap.style.display=myEmails.length>5?'block':'none';
  renderEmailRows(myEmails);
  const filterInput=document.getElementById('myEmailsFilter');
  if(filterInput){
    filterInput.oninput=function(){
      const q=this.value.toLowerCase();
      renderEmailRows(q?myEmails.filter(x=>x.email.toLowerCase().includes(q)):myEmails);
    };
  }
}

function renderEmailRows(list){
  const body=document.getElementById('myEmailsBody');
  const curVal=document.getElementById('emailInput').value.trim().toLowerCase();
  body.innerHTML=list.map((item,i)=>{
    const active=item.email.toLowerCase()===curVal;
    return`<tr>
      <td style="color:var(--text3);font-size:.68rem;padding-right:.5rem">${i+1}</td>
      <td style="color:var(--text);font-weight:600;word-break:break-all;font-size:.78rem">${esc(item.email)}</td>
      <td class="em-date-range">${emFmtRange(item.start_date,item.end_date)}</td>
      <td><button class="em-select-btn${active?' em-active':''}" data-email="${esc(item.email)}">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${active?'محدد':'اختيار'}
      </button></td>
    </tr>`;
  }).join('');
  body.querySelectorAll('.em-select-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const em=btn.dataset.email;
      document.getElementById('emailInput').value=em;
      body.querySelectorAll('.em-select-btn').forEach(b=>{b.classList.remove('em-active');b.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>اختيار';});
      btn.classList.add('em-active');
      btn.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>محدد';
      checkFetchReady();
    });
  });
}

/* ── Load on mount ── */
loadMyEmails();

/* ── Load categories on mount ── */
async function loadCategories(){
  try{
    const r=await fetch('/api/categories');
    const d=await r.json();
    categories=d.categories||[];
    renderCatList();
  }catch(e){
    categories=[];
  }
}
loadCategories();

/* ── Category picker ── */
const catOverlay=document.getElementById('catOverlay');
document.getElementById('catBtn').addEventListener('click',()=>{catOverlay.classList.add('show');renderCatList();});
document.getElementById('catCancelBtn').addEventListener('click',()=>catOverlay.classList.remove('show'));
catOverlay.addEventListener('click',e=>{if(e.target===catOverlay)catOverlay.classList.remove('show');});

const ICONS=['📬','📩','🔐','✉️','🔔','📋','💬','🏷️','📦','⚡'];
function renderCatList(){
  const list=document.getElementById('catList');
  if(!categories.length){list.innerHTML='<div class="state-box" style="min-height:80px"><p>لا توجد فئات — أضفها من لوحة المشرف</p></div>';return;}
  list.innerHTML=categories.map((c,i)=>{
    const chosen=c.id===selectedCatId;
    return`<div class="cat-option${chosen?' chosen':''}" data-id="${esc(c.id)}" data-label="${esc(c.label)}">
      <div class="cat-option-icon">${ICONS[i%ICONS.length]}</div>
      <div class="cat-option-body">
        <div class="cat-option-label">${esc(c.label)}</div>
        ${c.description?`<div class="cat-option-desc">${esc(c.description)}</div>`:''}
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('.cat-option').forEach(el=>{
    el.addEventListener('click',()=>{
      selectedCatId=el.dataset.id;selectedCatLabel=el.dataset.label;
      updateCatBtn();catOverlay.classList.remove('show');checkFetchReady();
    });
  });
}

function updateCatBtn(){
  const btn=document.getElementById('catBtn'),lbl=document.getElementById('catBtnLabel');
  if(selectedCatId!==null){lbl.textContent=selectedCatLabel;btn.classList.add('selected');}
}

/* ── Enable fetch button ── */
const emailInput=document.getElementById('emailInput');
emailInput.addEventListener('input',()=>{
  document.getElementById('myEmailsBody')?.querySelectorAll('.em-select-btn').forEach(b=>{
    const isActive=b.dataset.email===emailInput.value.trim().toLowerCase();
    b.classList.toggle('em-active',isActive);
    b.innerHTML=`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>${isActive?'محدد':'اختيار'}`;
  });
  checkFetchReady();
});

function checkFetchReady(){
  const ready=emailInput.value.trim().includes('@')&&selectedCatId!==null;
  document.getElementById('fetchBtn').disabled=!ready;
}

/* ── Fetch messages ── */
document.getElementById('fetchBtn').addEventListener('click',doFetch);
emailInput.addEventListener('keydown',e=>{if(e.key==='Enter')doFetch();});

async function doFetch(){
  if(fetchBusy)return;
  const em=emailInput.value.trim().toLowerCase();
  if(!em.includes('@')){toast('أدخل بريد إلكتروني صحيح',true);return;}
  fetchBusy=true;
  const btn=document.getElementById('fetchBtn'),lbl=document.getElementById('fetchLabel');
  btn.disabled=true;lbl.textContent='جارٍ الجلب…';
  const ico=btn.querySelector('svg');ico.classList.add('spin-ico');
  showSkeleton();
  try{
    const r=await fetch('/api/fetch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:em,category_id:selectedCatId||''})});
    const data=await r.json();
    if(!r.ok||data.error){throw new Error(data.error||'خطأ غير معروف');}
    allMsgs=data.messages||[];
    renderList(allMsgs);
    updatePill(data.total);
    const wb=document.getElementById('warnBar');
    if(data.warning){wb.textContent='⚠️ '+data.warning;wb.classList.add('show');}
    else wb.classList.remove('show');
  }catch(e){
    showError(e.message);
    document.getElementById('countPill').classList.remove('vis');
  }finally{
    fetchBusy=false;
    btn.disabled=false;lbl.textContent='تحديث';ico.classList.remove('spin-ico');
  }
}

function updatePill(n){const p=document.getElementById('countPill');p.textContent=n+' رسالة';p.classList.toggle('vis',n>0);}

function showSkeleton(){
  document.getElementById('resultsArea').innerHTML=`
    <div style="padding:.3rem .4rem;flex:1;overflow:hidden;">
      ${[55,70,48,63].map(w=>`<div class="sk-row"><div style="display:flex;gap:.45rem;margin-bottom:.5rem"><div class="sk" style="width:30px;height:30px;border-radius:9px;flex-shrink:0"></div><div style="flex:1"><div class="sk" style="height:11px;width:${w}%;margin-bottom:6px"></div><div class="sk" style="height:9px;width:85%"></div></div></div><div class="sk" style="height:8px;width:68%;margin-right:38px"></div></div>`).join('')}
    </div>`;
}

function showError(msg){
  document.getElementById('resultsArea').innerHTML=`<div class="state-box"><div class="ei">⚠️</div><p style="color:var(--danger)">${esc(msg)}</p></div>`;
}

function renderList(msgs){
  const area=document.getElementById('resultsArea');
  if(!msgs.length){area.innerHTML='<div class="state-box"><div class="ei">📭</div><p>لا توجد رسائل تطابق هذه الفئة</p></div>';return;}
  area.innerHTML=`
    <div class="results-head"><div class="search-wrap"><div class="search-ico"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><input id="searchInput" placeholder="بحث في النتائج…" autocomplete="off"/></div></div>
    <div class="msg-list" id="msgList">${renderRows(msgs)}</div>`;
  bindRows();
  document.getElementById('searchInput').addEventListener('input',function(){
    const q=this.value.toLowerCase();
    document.getElementById('msgList').innerHTML=renderRows(q?msgs.filter(m=>m.subject.toLowerCase().includes(q)||(m.sender_name||'').toLowerCase().includes(q)||(m.preview||'').toLowerCase().includes(q)):msgs);
    bindRows();
  });
}

function renderRows(msgs){
  if(!msgs.length)return'<div class="state-box" style="min-height:150px"><div class="ei">🔍</div><p>لا نتائج</p></div>';
  return msgs.map((m,i)=>{
    const av=aInit(m.sender_name,m.sender_addr);
    const col=aColor(m.sender_addr||m.sender_name||m.uid);
    const code=detectCode(m.preview||'');
    return`<div class="msg-row${m.uid===activeUid?' active':''}" data-uid="${esc(m.uid)}" style="animation-delay:${Math.min(i*18,160)}ms">
      <div class="row-top"><div class="row-left"><div class="av" style="background:${col}">${esc(av)}</div><div class="row-sender">${esc(m.sender_name||m.sender_addr)}</div></div><div class="row-date">${esc(m.date)}</div></div>
      <div class="row-subj">${esc(m.subject)}</div>
      <div class="row-prev">${esc(m.preview)}</div>
      ${code?`<div class="code-badge"><svg viewBox="0 0 24 24" style="width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:2.5"><polyline points="20 6 9 17 4 12"/></svg>${esc(code)}</div>`:''}
    </div>`;
  }).join('');
}

function bindRows(){
  document.querySelectorAll('#msgList .msg-row').forEach(row=>{
    row.addEventListener('click',()=>{openMessage(row.dataset.uid);if(isMob())goViewer();});
  });
}

/* ── Open message ── */
async function openMessage(uid){
  if(!uid)return;
  activeUid=uid;
  document.querySelectorAll('.msg-row').forEach(r=>r.classList.toggle('active',r.dataset.uid===uid));
  const meta=allMsgs.find(m=>m.uid===uid);
  const viewer=document.getElementById('viewer');
  if(!meta){viewer.innerHTML='<div class="ph"><p style="color:var(--danger)">رسالة غير موجودة</p></div>';return;}
  const av=aInit(meta.sender_name,meta.sender_addr);
  const col=aColor(meta.sender_addr||meta.sender_name||uid);

  viewer.innerHTML=`<div class="viewer-inner">
    <button class="back-btn" id="backBtn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>الرسائل</button>
    <div class="code-banner" id="codeBanner">
      <div class="cb-icon"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M12 12h.01"/><path d="M17 12h.01"/><path d="M7 12h.01"/></svg></div>
      <div class="cb-body"><div class="cb-label">🔐 رمز تحقق</div><div class="cb-code" id="cbCode"></div></div>
      <button class="cb-copy" id="cbCopy"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>نسخ</button>
    </div>
    <div class="hdr-card">
      <div class="hdr-subj">${esc(meta.subject)}</div>
      <div class="hdr-row">
        <div class="from-chip">
          <div class="av" style="background:${col};width:20px;height:20px;border-radius:6px;font-size:.55rem;flex-shrink:0">${esc(av)}</div>
          <span class="fname">${esc(meta.sender_name||meta.sender_addr)}</span>
          ${meta.sender_name?`<span class="faddr">&lt;${esc(meta.sender_addr)}&gt;</span>`:''}
        </div>
        <span class="hdr-date">${esc(meta.date)}</span>
      </div>
    </div>
    <div class="body-card">
      <div class="body-bar"><div class="view-tog" id="viewTog"><button class="vtog-btn on" id="btnHtml">HTML</button><button class="vtog-btn" id="btnPlain">نص عادي</button></div></div>
      <div id="bc"><div class="body-skel"><div class="sk" style="height:13px;width:55%;margin-bottom:9px"></div><div class="sk" style="height:10px;width:88%;margin-bottom:7px"></div><div class="sk" style="height:10px;width:72%;margin-bottom:7px"></div><div class="sk" style="height:10px;width:80%"></div></div></div>
    </div>
  </div>`;

  document.getElementById('backBtn')?.addEventListener('click',goSidebar);

  try{
    const r=await fetch('/api/message/'+encodeURIComponent(uid));
    const body=await r.json();
    if(body.error){document.getElementById('bc').innerHTML=`<div class="inline-err"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>${esc(body.error)}</div>`;return;}

    const isHtml=body.body_type==='html';
    const rawBody=body.body||'';

    /* OTP detection */
    let codeText=null;
    if(isHtml){const tmp=document.createElement('div');tmp.innerHTML=rawBody;codeText=detectCode(tmp.textContent||tmp.innerText||'');}
    else{codeText=detectCode(rawBody);}
    if(codeText){
      const banner=document.getElementById('codeBanner');
      if(banner){banner.classList.add('show');document.getElementById('cbCode').textContent=codeText;
        document.getElementById('cbCopy').addEventListener('click',()=>{navigator.clipboard?.writeText(codeText).then(()=>toast('تم النسخ ✓')).catch(()=>{});});
      }
    }

    if(isHtml){
      const tog=document.getElementById('viewTog');if(tog)tog.style.display='flex';
      let showHtml=true;
      function renderHtml(){
        document.getElementById('bc').innerHTML=`<div class="body-content"><iframe class="body-frame" id="bodyFrame" sandbox="allow-same-origin allow-popups"></iframe></div>`;
        const frame=document.getElementById('bodyFrame');
        const doc=frame.contentDocument||frame.contentWindow.document;
        const tmp=document.createElement('div');
        tmp.innerHTML = rawBody;
        tmp.querySelectorAll('a').forEach(a=>a.setAttribute('target','_blank'));
        tmp.querySelectorAll('form').forEach(f=>f.setAttribute('target','_blank'));
        tmp.querySelectorAll('base').forEach(b=>b.remove());
        doc.open();doc.write(tmp.innerHTML);doc.close();
        try{const bh=doc.documentElement.scrollHeight;if(bh>100)frame.style.minHeight=Math.min(bh+40,1800)+'px';}catch{}
        try{
          doc.addEventListener('click',e=>{
            const a=e.target.closest('a');
            if(a && a.href){
              if(a.target !== '_blank'){
                e.preventDefault();
                window.open(a.href,'_blank');
              }
            }
          });
        }catch{}
      }
      function renderPlain(){const tmp=document.createElement('div');tmp.innerHTML=rawBody;document.getElementById('bc').innerHTML=`<div class="body-content"><div class="body-plain">${esc(tmp.textContent||tmp.innerText||'')}</div></div>`;}
      renderHtml();
      document.getElementById('btnHtml')?.addEventListener('click',()=>{showHtml=true;document.getElementById('btnHtml').classList.add('on');document.getElementById('btnPlain').classList.remove('on');renderHtml();});
      document.getElementById('btnPlain')?.addEventListener('click',()=>{showHtml=false;document.getElementById('btnPlain').classList.add('on');document.getElementById('btnHtml').classList.remove('on');renderPlain();});
    }else{
      document.getElementById('bc').innerHTML=`<div class="body-content"><div class="body-plain">${esc(rawBody)}</div></div>`;
    }
  }catch(e){
    document.getElementById('bc').innerHTML=`<div class="inline-err"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>تعذّر تحميل الرسالة</div>`;
  }
}

})();
</script>
</body>
</html>
