<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MailBox — لوحة التحكم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [data-theme="dark"] {
      --bg:#05080f; --surface:rgba(12,18,32,.92); --border:rgba(255,255,255,.08);
      --border2:rgba(255,255,255,.13); --text:#dde3f0; --text2:#8b97b0; --muted:#4a5468;
      --danger:#f25f7a; --glow1:rgba(79,142,247,.15); --glow2:rgba(124,94,245,.12);
      --shadow:0 40px 100px rgba(0,0,0,.6); --grid:rgba(79,142,247,.025);
    }
    [data-theme="light"] {
      --bg:#eef2f9; --surface:rgba(255,255,255,.95); --border:rgba(0,0,0,.08);
      --border2:rgba(0,0,0,.13); --text:#111827; --text2:#4b5563; --muted:#9ca3af;
      --danger:#dc2626; --glow1:rgba(79,142,247,.1); --glow2:rgba(124,94,245,.08);
      --shadow:0 40px 100px rgba(0,0,0,.15); --grid:rgba(79,142,247,.04);
    }
    :root { --accent:#4f8ef7; --accent2:#7c5ef5; }
    body {
      font-family:'Alexandria',sans-serif; background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
      overflow:hidden; position:relative; transition:background .3s,color .3s;
    }
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
      background-size:44px 44px;
    }
    .glow { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; opacity:0; animation:glowIn 1s ease forwards; }
    .g1 { width:550px;height:550px;background:radial-gradient(circle,var(--glow1),transparent 70%);top:-180px;right:-100px;animation-delay:.1s; }
    .g2 { width:460px;height:460px;background:radial-gradient(circle,var(--glow2),transparent 70%);bottom:-140px;left:-80px;animation-delay:.3s; }
    @keyframes glowIn { to { opacity:1; } }
    .theme-toggle {
      position:fixed; top:1rem; left:1rem; z-index:20; width:38px; height:38px;
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
      color:var(--text2); transition:background .2s,color .2s; backdrop-filter:blur(12px);
    }
    .theme-toggle:hover { color:var(--text); }
    .theme-toggle svg { width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round; }
    .card {
      position:relative; z-index:1; width:100%; max-width:430px; margin:1rem;
      background:var(--surface); border:1px solid var(--border); border-radius:24px;
      padding:2.8rem 2.4rem 2.4rem; backdrop-filter:blur(24px); box-shadow:var(--shadow);
      animation:cardIn .5s cubic-bezier(.22,1,.36,1) both; transition:background .3s,border-color .3s;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(.98)} to{opacity:1;transform:none} }
    .logo { display:flex; align-items:center; gap:.65rem; margin-bottom:2rem; }
    .logo-mark {
      width:44px; height:44px; flex-shrink:0;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius:13px; display:flex; align-items:center; justify-content:center;
      box-shadow:0 6px 20px rgba(79,142,247,.3);
    }
    .logo-mark svg { width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round; }
    .logo-name { font-size:1.5rem; font-weight:800; letter-spacing:-.02em; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .admin-badge {
      display:inline-flex; align-items:center; gap:.4rem;
      background:rgba(242,95,122,.1); border:1px solid rgba(242,95,122,.25);
      color:#f25f7a; border-radius:20px; padding:.3rem .75rem;
      font-size:.72rem; font-weight:700; margin-bottom:1.5rem;
    }
    h1 { font-size:1.6rem; font-weight:700; letter-spacing:-.02em; margin-bottom:.4rem; }
    .subtitle { font-size:.88rem; color:var(--text2); margin-bottom:1.8rem; line-height:1.6; }
    .error-box {
      display:flex; align-items:flex-start; gap:.5rem;
      background:rgba(220,38,38,.08); border:1px solid rgba(220,38,38,.22);
      border-radius:11px; padding:.8rem .95rem; color:var(--danger);
      font-size:.86rem; margin-bottom:1.3rem; line-height:1.5;
    }
    .field { margin-bottom:1.2rem; }
    label { display:block; font-size:.71rem; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); margin-bottom:.45rem; }
    .inp-wrap { position:relative; }
    .inp-icon { position:absolute; right:.9rem; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; display:flex; }
    .inp-icon svg { width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round; }
    input[type="password"] {
      width:100%; background:rgba(79,142,247,.04); border:1px solid var(--border2);
      border-radius:11px; padding:.82rem 2.5rem .82rem 1rem;
      color:var(--text); font-family:'Alexandria',sans-serif; font-size:.93rem; outline:none;
      transition:border-color .2s,box-shadow .2s,background .2s;
    }
    input[type="password"]:focus { border-color:rgba(79,142,247,.5); box-shadow:0 0 0 3px rgba(79,142,247,.1); background:rgba(79,142,247,.06); }
    input::placeholder { color:var(--muted); }
    button[type="submit"] {
      width:100%; padding:.9rem; background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none; border-radius:13px; color:#fff;
      font-family:'Alexandria',sans-serif; font-size:.98rem; font-weight:700;
      cursor:pointer; margin-top:.4rem; box-shadow:0 6px 20px rgba(79,142,247,.32);
      transition:opacity .2s,transform .15s,box-shadow .2s;
    }
    button[type="submit"]:hover { opacity:.92; }
    button[type="submit"]:active { transform:scale(.98); }
  </style>
</head>
<body>
  <div class="glow g1"></div>
  <div class="glow g2"></div>
  <button class="theme-toggle" id="themeBtn" title="تبديل المظهر">
    <svg id="iconMoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="iconSun" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
  </button>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
      </div>
      <span class="logo-name">MailBox</span>
    </div>
    <div class="admin-badge">🔐 لوحة التحكم</div>
    <h1>دخول المشرف</h1>
    <p class="subtitle">أدخل كلمة المرور للوصول إلى لوحة التحكم</p>
    {% if error %}
    <div class="error-box">⚠️ <span>{{ error }}</span></div>
    {% endif %}
    <form method="POST">
      <div class="field">
        <label>كلمة المرور</label>
        <div class="inp-wrap">
          <div class="inp-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
          <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
      </div>
      <button type="submit">الدخول</button>
    </form>
  </div>
  <script>
    const html = document.documentElement;
    const moon = document.getElementById('iconMoon');
    const sun  = document.getElementById('iconSun');
    const saved = localStorage.getItem('mb-theme') || 'dark';
    function applyTheme(t) {
      html.setAttribute('data-theme', t);
      localStorage.setItem('mb-theme', t);
      moon.style.display = t === 'dark' ? 'block' : 'none';
      sun.style.display  = t === 'light' ? 'block' : 'none';
    }
    applyTheme(saved);
    document.getElementById('themeBtn').addEventListener('click', () =>
      applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
  </script>
</body>
</html>
